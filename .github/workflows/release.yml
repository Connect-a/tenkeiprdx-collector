name: release
on:
  push:
    tags: ['v*', '[0-9]*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full
      - name: Package (zip + 7z)
        # README.md ＋ extension/ を同梱（展開→READMEを読み→中の extension を load-unpacked）
        run: |
          zip -r tenkeiprdx-collector-${{ github.ref_name }}.zip README.md extension
          7z a tenkeiprdx-collector-${{ github.ref_name }}.7z README.md extension
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            tenkeiprdx-collector-${{ github.ref_name }}.zip
            tenkeiprdx-collector-${{ github.ref_name }}.7z
